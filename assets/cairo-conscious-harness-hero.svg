<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CAIRO Conscious Harness</title>
  <desc id="desc">A dark blue and purple architecture banner showing user goals flowing through CAIRO orchestration, model intelligence, swarm intelligence, secure execution, memory, and autonomous companies.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030816"/>
      <stop offset="0.42" stop-color="#0A1027"/>
      <stop offset="1" stop-color="#160A2A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(850 260) rotate(90) scale(420 620)">
      <stop stop-color="#7C5CFF" stop-opacity="0.48"/>
      <stop offset="0.58" stop-color="#3A8BFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#030816" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 610) rotate(20) scale(520 260)">
      <stop stop-color="#18D6FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#18D6FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="230" y1="100" x2="1370" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31C9FF"/>
      <stop offset="0.52" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#F45BFF"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1E2B4A"/>
      <stop offset="1" stop-color="#24143E"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="42" fill="url(#bg)"/>
  <rect width="1600" height="720" rx="42" fill="url(#glowA)"/>
  <rect width="1600" height="720" rx="42" fill="url(#glowB)"/>

  <g opacity="0.18">
    <path d="M0 110H1600M0 250H1600M0 390H1600M0 530H1600" stroke="#A9B8FF"/>
    <path d="M180 0V720M440 0V720M700 0V720M960 0V720M1220 0V720M1480 0V720" stroke="#A9B8FF"/>
  </g>

  <rect x="88" y="72" width="102" height="102" rx="30" fill="#071225" stroke="url(#stroke)" stroke-width="2"/>
  <g transform="translate(94 78) scale(0.09)">
    <path d="M500,343.8c16.6,0,33.5,2.2,49.6,6.5c44.2-49.6,124.8-70.5,159.3-56.1c34.7,14.4-10.4,173.7-10.4,173.7c14.1,26.6,24.8,55.6,24.8,85.4c0,110.7-100,187.6-223.4,187.6c-123.4,0-223.4-74.5-223.4-187.6c0-31,12.4-59.6,24.8-85.4c0,0-46.9-159.3-12.4-173.7c34.5-14.4,117.2,5.7,161.3,55.4C466.6,345.7,483.3,343.8,500,343.8z" fill="none" stroke="url(#stroke)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M400.7,544.2v12.4M599.3,544.2v12.4" fill="none" stroke="url(#stroke)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M518.6,609.2c5.6,0,10.6,3.4,12.7,8.5c2.1,5.1,1,11.1-3,15l-18.6,18.6c-5.4,5.4-14.1,5.4-19.5,0l-18.6-18.6c-3.9-3.9-5.1-9.9-3-15c2.1-5.2,7.2-8.5,12.7-8.5H518.6z" fill="none" stroke="url(#stroke)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="500" cy="500" r="388.6" fill="none" stroke="url(#stroke)" stroke-width="24"/>
  </g>

  <text x="215" y="124" fill="#EAF1FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="1.5">CAIRO CONSCIOUS HARNESS</text>
  <text x="215" y="164" fill="#89A7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Software-first operational intelligence for goals, agents, swarms, tools, memory, and autonomous execution.</text>

  <text x="94" y="274" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="900">The next-generation</text>
  <text x="94" y="354" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="900">AI agent harness</text>
  <text x="98" y="410" fill="#AFC3E9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600">Users should not prompt agents. CAIRO prompts agents for users.</text>

  <g filter="url(#softShadow)">
    <rect x="800" y="128" width="618" height="454" rx="34" fill="#070B18" fill-opacity="0.88" stroke="url(#stroke)" stroke-width="2"/>
    <rect x="838" y="166" width="542" height="80" rx="24" fill="url(#pill)" stroke="#3E4D7D"/>
    <text x="875" y="198" fill="#8FDFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900" letter-spacing="1.4">USER GOAL</text>
    <text x="875" y="226" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="850">Outcome, not prompt engineering</text>

    <path d="M1109 258V294" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round" filter="url(#neon)"/>
    <path d="M1098 286L1109 300L1120 286" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="838" y="306" width="250" height="88" rx="22" fill="#11172C" stroke="#32436F"/>
    <text x="866" y="338" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">CPOP</text>
    <text x="866" y="366" fill="#AFC3E9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Intent -> task graph -> prompt DNA</text>

    <rect x="1130" y="306" width="250" height="88" rx="22" fill="#11172C" stroke="#32436F"/>
    <text x="1158" y="338" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Model Intelligence</text>
    <text x="1158" y="366" fill="#AFC3E9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">MC-1, frontier, local, open models</text>

    <rect x="838" y="424" width="250" height="88" rx="22" fill="#11172C" stroke="#32436F"/>
    <text x="866" y="456" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">CSIP Swarms</text>
    <text x="866" y="484" fill="#AFC3E9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Parallel agents, long horizon, LHTK</text>

    <rect x="1130" y="424" width="250" height="88" rx="22" fill="#11172C" stroke="#32436F"/>
    <text x="1158" y="456" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Secure Execution</text>
    <text x="1158" y="484" fill="#AFC3E9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Governed tools, memory, self-healing</text>
  </g>

  <g>
    <rect x="94" y="475" width="160" height="48" rx="24" fill="#11172C" stroke="#334A80"/>
    <text x="122" y="506" fill="#BBD6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Cairo Operator</text>
    <rect x="274" y="475" width="132" height="48" rx="24" fill="#11172C" stroke="#334A80"/>
    <text x="306" y="506" fill="#BBD6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Cairo Code</text>
    <rect x="426" y="475" width="198" height="48" rx="24" fill="#11172C" stroke="#334A80"/>
    <text x="456" y="506" fill="#BBD6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Software Engineer</text>
    <rect x="94" y="542" width="210" height="48" rx="24" fill="#11172C" stroke="#334A80"/>
    <text x="123" y="573" fill="#BBD6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Autonomous Companies</text>
    <rect x="324" y="542" width="145" height="48" rx="24" fill="#11172C" stroke="#334A80"/>
    <text x="354" y="573" fill="#BBD6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Plugins MCPs</text>
    <rect x="489" y="542" width="154" height="48" rx="24" fill="#11172C" stroke="#334A80"/>
    <text x="519" y="573" fill="#BBD6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">DCRS + Nango</text>
  </g>

  <text x="94" y="655" fill="#6F85B7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Goal -> Cognitive orchestration -> Model routing -> Swarm execution -> Memory -> Verification -> Self-improvement</text>
</svg>
